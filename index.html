<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Look Interactive — vision &amp; dynamics</title>
<meta name="description" content="Look Interactive — vision & dynamics, digital signage, and content delivery.">
<meta property="og:title" content="Look Interactive">
<meta property="og:description" content="Look Interactive — vision & dynamics, digital signage, and content delivery.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://look-interactive.com">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='11' fill='none' stroke='%23e6398c' stroke-width='3'/><circle cx='16' cy='16' r='4' fill='%236a5cff'/></svg>">
<style>
  :root{
    --bg:#0b0c10; --ink:#f2f4f8; --muted:#9aa3b2; --line:#20242e; --accent:#6a5cff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font:16px/1.6 system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg);
    min-height:100vh; display:flex; flex-direction:column;
    overflow-x:hidden;
  }
  /* soft light-field depth glow behind the hero */
  body::before{
    content:""; position:fixed; inset:-30% -10% auto -10%; height:90vh; z-index:0; pointer-events:none;
    background:
      radial-gradient(40% 55% at 30% 30%, rgba(106,92,255,.22), transparent 70%),
      radial-gradient(38% 50% at 72% 42%, rgba(230,57,140,.18), transparent 70%),
      radial-gradient(42% 55% at 55% 78%, rgba(38,208,206,.14), transparent 72%);
    filter:blur(6px);
  }
  .wrap{position:relative; z-index:1; width:100%; max-width:1000px; margin:0 auto; padding:0 24px}
  header{padding:22vh 0 8vh}
  .eyebrow{font-size:13px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin:0 0 18px}
  .mark{
    margin:0; line-height:.98; font-weight:800; letter-spacing:-.03em;
    font-size:clamp(46px,11vw,104px);
    /* lenticular rainbow shimmer that drifts, like a lens shifting with your view */
    background:linear-gradient(100deg,#6a5cff,#26d0ce,#e6398c,#ffb454,#6a5cff);
    background-size:280% 100%;
    -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:shift 9s ease-in-out infinite;
  }
  @keyframes shift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @media (prefers-reduced-motion:reduce){.mark{animation:none}}
  .tag{font-size:clamp(18px,2.6vw,24px); color:#dfe4ee; margin:22px 0 0; max-width:24ch; font-weight:500}
  .sub{color:var(--muted); margin:16px 0 0; max-width:52ch}
  .caps{display:flex; flex-wrap:wrap; gap:10px; margin:30px 0 0; padding:0; list-style:none}
  .caps li{font-size:13.5px; color:#cfd6e2; border:1px solid var(--line); border-radius:999px;
    padding:7px 14px; background:rgba(255,255,255,.02); transition:border-color .14s}
  .caps li:hover{border-color:var(--accent)}
  .caps li b{color:var(--ink); font-weight:600}
  footer{margin-top:auto; position:relative; z-index:1; border-top:1px solid var(--line)}
  .foot{display:flex; flex-wrap:wrap; gap:8px 20px; align-items:center; justify-content:space-between;
    padding:22px 0; color:var(--muted); font-size:14px}
  .foot a{color:var(--ink); text-decoration:none; border-bottom:1px solid var(--line); padding-bottom:1px}
  .foot a:hover{border-color:var(--accent)}
  .foot .mono{font-family:ui-monospace,Menlo,monospace}
</style>
</head>
<body>
<header class="wrap">
  <p class="eyebrow">Look Interactive</p>
  <h1 class="mark">look&nbsp;interactive</h1>
  <p class="tag">The dynamics of vision.</p>
  <p class="sub">Where vision meets dynamics — how you look changes what you see.</p>
  <ul class="caps">
    <li><b>Vision &amp; dynamics</b></li>
    <li>Digital signage</li>
    <li>Content delivery</li>
  </ul>
</header>

<footer>
  <div class="wrap foot">
    <span>© Look Interactive</span>
    <a class="mono" href="mailto:hello@look-interactive.com">hello@look-interactive.com</a>
  </div>
</footer>
</body>
</html>
